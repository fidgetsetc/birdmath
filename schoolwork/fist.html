<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Player | Instant Boot</title>
    <!-- Ruffle is the GOAT for Flash emulation -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        /* Loading screen vibes */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: white;
            z-index: 50;
            font-family: ui-sans-serif, system-ui, sans-serif;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- This overlay shows until the game is ready -->
    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-medium tracking-wide">Loading your game...</p>
        <p class="text-sm text-gray-400 mt-2">"You know who else likes Flash games?"</p>
    </div>

    <div id="container"></div>

    <script>
        // CONFIG: Change the path below to your actual .swf file
        // If it's in the same folder, just put 'game.swf'
        const gameUrl = '/swf/fist/FistPunch.swf'; 

        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", async () => {
            const container = document.getElementById("container");
            const overlay = document.getElementById("loading-overlay");
            
            // Initializing Ruffle
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            player.style.width = "100%";
            player.style.height = "100%";
            container.appendChild(player);

            try {
                // Load the internal path
                await player.load({
                    url: gameUrl,
                    backgroundColor: "#000000",
                    letterbox: "on",
                    autoplay: "on",
                    unmuteOverlay: "hidden"
                });

                // Hide loading screen once it's vibing
                overlay.style.opacity = "0";
                setTimeout(() => overlay.remove(), 500);

            } catch (err) {
                console.error("Ruffle failed:", err);
                overlay.innerHTML = `
                    <div class="text-center p-6">
                        <p class="text-red-400 text-xl font-bold">L + Ratio + No SWF found</p>
                        <p class="text-gray-300 mt-2 text-sm">Make sure '${gameUrl}' is in the right folder!</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
