<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Experience</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: sans-serif;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

    <div id="loader">
        <h1>Loading Bad Piggies...</h1>
        <p>This may take a bit.</p>
        <hr>
        <p>Default loading screen disabled</p>
    </div>

    <iframe id="mainFrame" src="/schoolwork/Bad Piggies.html"></iframe>

    <script>
        const iframe = document.getElementById('mainFrame');
        const loader = document.getElementById('loader');

        // Logic: Wait for iframe to finish loading, THEN wait 10 seconds
        iframe.onload = () => {
            console.log("Iframe finished loading.");
            
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    iframe.style.display = 'block';
                }, 500); // Matches transition duration
            }, 10000); // 10-second delay
        };
    </script>
</body>
</html>
