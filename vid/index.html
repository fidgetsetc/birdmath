<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Player Embed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 20;
        }

        .video-container:hover .controls-overlay {
            opacity: 1;
        }

        .pointer-auto {
            pointer-events: auto;
        }

        input[type=range] {
            accent-color: #818cf8;
            cursor: pointer;
        }

        .loop-active {
            color: #818cf8;
            filter: drop-shadow(0 0 8px rgba(129, 140, 248, 0.8));
        }

        #big-play-btn {
            position: absolute;
            z-index: 30;
            background: rgba(129, 140, 248, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            display: flex;
        }
        
        #big-play-btn:hover {
            transform: scale(1.1);
            background: rgba(129, 140, 248, 0.5);
        }

        /* Hide big button when playing */
        .is-playing #big-play-btn {
            display: none;
        }
    </style>
</head>
<body>

    <div id="container" class="video-container">
        <video id="v" playsinline>
            <source src="" type="video/mp4">
        </video>

        <!-- Big Center Play Button -->
        <button id="big-play-btn" class="w-20 h-20 rounded-full flex items-center justify-center text-white active:scale-95">
            <i class="fas fa-play text-3xl ml-1"></i>
        </button>

        <!-- Controls UI -->
        <div class="controls-overlay pointer-auto flex flex-col gap-3">
            <!-- Progress Bar -->
            <input type="range" id="seek" value="0" step="0.1" class="w-full h-1.5 rounded-lg appearance-none bg-white/20">

            <div class="flex items-center justify-between text-white px-1">
                <div class="flex items-center gap-6">
                    <button id="play-btn" class="text-lg w-6"><i class="fas fa-play"></i></button>
                    
                    <div class="flex items-center gap-2">
                        <button id="mute-btn" class="w-6"><i class="fas fa-volume-up"></i></button>
                        <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" class="w-20 h-1">
                    </div>

                    <span class="text-[10px] font-mono tracking-widest opacity-70">
                        <span id="cur">0:00</span> / <span id="dur">0:00</span>
                    </span>
                </div>

                <div class="flex items-center gap-6">
                    <button id="loop-btn" title="Toggle Loop" class="transition-all opacity-60 hover:opacity-100">
                        <i class="fas fa-infinity text-lg"></i>
                    </button>
                    <button id="fs-btn" class="opacity-60 hover:opacity-100">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const v = document.getElementById('v');
        const playBtn = document.getElementById('play-btn');
        const bigPlay = document.getElementById('big-play-btn');
        const seek = document.getElementById('seek');
        const muteBtn = document.getElementById('mute-btn');
        const volSlider = document.getElementById('vol-slider');
        const curTime = document.getElementById('cur');
        const durTime = document.getElementById('dur');
        const loopBtn = document.getElementById('loop-btn');
        const fsBtn = document.getElementById('fs-btn');

        // Logic to get the URL directly after the "?"
        const rawParam = window.location.search.substring(1); 
        const videoSrc = rawParam.startsWith('v=') ? rawParam.split('v=')[1] : rawParam;

        // Fallback
        v.src = decodeURIComponent(videoSrc) || 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4';

        const toggle = () => {
            if (v.paused) {
                v.play().catch(err => console.log("Autoplay/Play blocked:", err));
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                container.classList.add('is-playing');
            } else {
                v.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                container.classList.remove('is-playing');
            }
        };

        const format = (s) => {
            if (isNaN(s) || !isFinite(s)) return "0:00";
            const m = Math.floor(s / 60);
            s = Math.floor(s % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        // Events
        bigPlay.onclick = toggle;
        playBtn.onclick = toggle;
        v.onclick = toggle;

        v.ontimeupdate = () => {
            if (!v.duration) return;
            seek.value = (v.currentTime / v.duration) * 100;
            curTime.innerText = format(v.currentTime);
        };

        v.onloadedmetadata = () => {
            durTime.innerText = format(v.duration);
        };

        seek.oninput = () => {
            if (!v.duration) return;
            v.currentTime = (seek.value / 100) * v.duration;
        };

        // Volume Logic
        volSlider.oninput = (e) => {
            const val = parseFloat(e.target.value);
            v.volume = val;
            v.muted = val === 0;
            updateVolIcon(val);
        };

        function updateVolIcon(val) {
            if (val === 0) muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            else if (val < 0.5) muteBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
            else muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        }

        muteBtn.onclick = () => {
            v.muted = !v.muted;
            if (v.muted) {
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                volSlider.value = 0;
            } else {
                updateVolIcon(v.volume);
                volSlider.value = v.volume;
            }
        };

        // Loop Toggle
        loopBtn.onclick = () => {
            v.loop = !v.loop;
            loopBtn.classList.toggle('loop-active', v.loop);
            loopBtn.classList.toggle('opacity-60', !v.loop);
        };

        // Fullscreen Fix for Permission Policy
        fsBtn.onclick = () => {
            try {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    if (container.requestFullscreen) {
                        container.requestFullscreen().catch(e => {
                            // Fallback to video element if container is disallowed
                            v.requestFullscreen().catch(err => console.error("FS Error:", err));
                        });
                    } else if (container.webkitRequestFullscreen) {
                        container.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            } catch (err) {
                console.error("Fullscreen policy restriction:", err);
            }
        };

        // Keyboard support
        window.onkeydown = (e) => { 
            if(e.code === 'Space') { 
                e.preventDefault(); 
                toggle(); 
            } 
        };
    </script>
</body>
</html>
