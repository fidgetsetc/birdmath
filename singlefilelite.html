<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPIX | SFL LITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --accent: #61dafb; --bg: #050505; --card: #111; --text: #fafafa; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        #background3DCanvas { position: fixed; inset: 0; z-index: -1; opacity: 0.4; pointer-events: none; }
        header { text-align: center; padding: 30px 10px 10px; }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 15px rgba(97,218,251,0.5); }
        
        nav { display: flex; justify-content: center; gap: 10px; padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(12px); z-index: 50; border-bottom: 1px solid #222; }
        .tab-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 22px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(97,218,251,0.1); }
        
        .tab-content { display: none; padding: 20px; max-width: 1300px; margin: 0 auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-bar { width: 100%; max-width: 500px; display: block; margin: 0 auto 30px; background: #181818; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 12px; font-size: 1rem; outline: none; }
        .search-bar:focus { border-color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #222; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 120px; object-バランス: cover; display: block; background: #000; }
        .card-info { padding: 12px; text-align: center; }
        .card-info h3 { margin: 0 0 10px; font-size: 0.95rem; font-weight: 500; height: 2.4em; overflow: hidden; line-height: 1.2; }
        
        .action-btn { width: 100%; background: var(--accent); border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: #000; }
        .action-btn:active { transform: scale(0.95); opacity: 0.8; }

        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #player.active { display: flex; }
        .player-controls { padding: 10px 20px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        #player-frame { flex: 1; border: none; background: #000; }
        
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } }
    </style>
</head>
<body>

<canvas id="background3DCanvas"></canvas>

<header><h1>EPIX</h1></header>

<nav>
    <button class="tab-btn active" onclick="switchTab('apps')">Apps</button>
    <button class="tab-btn" onclick="switchTab('games')">Games</button>
    <button class="tab-btn" onclick="switchTab('videos')">Videos</button>
</nav>

<main>
    <div id="apps" class="tab-content active">
        <input type="text" class="search-bar" placeholder="Search apps..." oninput="filterItems('apps', this.value)">
        <div class="grid" id="apps-grid"></div>
    </div>
    <div id="games" class="tab-content">
        <input type="text" class="search-bar" placeholder="Search games..." oninput="filterItems('games', this.value)">
        <div class="grid" id="games-grid"></div>
    </div>
    <div id="videos" class="tab-content">
        <input type="text" class="search-bar" placeholder="Search videos..." oninput="filterItems('videos', this.value)">
        <div class="grid" id="videos-grid"></div>
    </div>
</main>

<div id="player">
    <div class="player-controls">
        <span id="playing-title" style="font-weight: bold; color: var(--accent);">Loading...</span>
        <div style="display: flex; gap: 10px;">
            <button class="tab-btn" style="padding: 5px 15px; border-radius: 5px;" onclick="toggleFS()">Fullscreen</button>
            <button class="tab-btn" style="padding: 5px 15px; border-radius: 5px; color: #ff5555; border-color: #ff5555;" onclick="closePlayer()">Close</button>
        </div>
    </div>
    <div id="player-view" style="display: contents;"></div>
</div>

<script>
    const DB = {

            { name: 'Web Browser', url: 'https://storage.googleapis.com/canvas-lms/index.html#/search', img: 'https://storage.googleapis.com/gweb-uniblog-publish-prod/images/1_-_Cover.width-1300.png' },
            { name: 'Browser Settings', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/schoolwork/other/bset.html', img: 'https://preview.redd.it/windows-settings-icon-v0-wwp9814f6o9e1.png?width=640&crop=smart&auto=webp&s=6d393f5cc37af740dd64399e42459343ea435c60' },
            { name: 'Terminal', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/cmd/index.html', img: 'https://cdn.dribbble.com/userupload/20822754/file/original-cd50415ce6ef260ee787b52cc9d5f553.png?resize=752x&vertical=center' },
            { name: 'Android but Gemini AI', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/phone/index.html', img: 'https://files.catbox.moe/sh07h7.png' },
            { name: 'VidScroll (EPIX)', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/vid/scroll/index.html', img: 'https://media.istockphoto.com/id/1411416036/video/person-using-social-media-app-on-smartphone-looking-at-live-stream-videos-realistic-feed.jpg?s=640x640&k=20&c=lqMYgjLU39MDjvox29ESaaXuot-Hy02WtWai2-Y4lXE=' }
        ],
        games: [
            { name: 'Minecrft 1.8 WASM', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/schoolwork/mine.html', img: 'https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/ncom/software/switch/70010000000964/a28a81253e919298beab2295e39a56b7a5140ef15abdb56135655e5c221b2a3a' },
            { name: 'Minecraft Pocket', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/pocket/index.html', img: 'https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/ncom/software/switch/70010000000964/a28a81253e919298beab2295e39a56b7a5140ef15abdb56135655e5c221b2a3a' },
            { name: 'Angry Birds', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/swf/ab/index.html', img: 'https://www.angrybirds.com/wp-content/uploads/2022/06/AB_Classic_1920x1080_TitlePicture_Vector-1300x731.png' },
            { name: 'Clash of Vikings', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/clash_royale/index.html', img: 'https://play-lh.googleusercontent.com/UOJ0N42bDu2lUbZIx4n9UCnHtnY5IEyG1jOLXByCbbCvi6wammxVR4XC9endWA5rAA=w526-h296-rw' },
            { name: 'Cookie Clicker', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/cookie_clicker/index.html', img: 'https://image.api.playstation.com/vulcan/ap/rnd/202507/0723/5bf9ed682a32f58b4546da14f58aa87b6a5f0665b0471fff.png' },
            { name: 'Bit Life', url: 'https://york.cadou.ro.cdn.cloudflare.net/db2/2025/more/e-life-simulation/pre.html', img: 'https://bitlife-game.io/data/image/bit-life-simulator.jpg' },
            { name: 'Block Blast', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/blocky_puzzle/index.html', img: 'https://m.media-amazon.com/images/I/A1OGHmQseNL.png' },
            { name: '1v1. lol', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/1v1lol/index.html', img: 'https://images.crazygames.com/auto-covers/1v1-lol_1x1.png?auto=format,compress&q=75&cs=strip' },
            { name: 'FNAF 1', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
            { name: 'FNAF 2', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf2/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
            { name: 'FNAF 3', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf3/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
            { name: 'FNAF 4', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf4/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
            { name: 'Sister Location', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf5/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
            { name: 'Gun Spin', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/gun_spin/index.html', img: 'https://avatars.mds.yandex.net/get-games/1881364/2a0000018a84536f8f204850647e286df2e9/orig' },
            { name: 'FNF', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/friday_night_funkin/index.html', img: 'https://friday-nightfunkin.io/upload/imgs/friday-night-funkin.jpg' },
            { name: 'Geometry Dash', url: './schoolwork/gd.html', img: 'https://i.redd.it/dorae3yhjqhb1.jpg' },
            { name: 'Run 3', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/run3/index.html', img: 'https://static.keygames.com/7/89667/48385/672x448/run-3.webp' },
            { name: 'Among Us', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/schoolwork/index.html', img: 'https://static1.colliderimages.com/wordpress/wp-content/uploads/2024/03/among-us-social-featured.jpg' },
            { name: 'Flappy Bird', url: 'https://cdn.jsdelivr.net/gh/fidgetsetc/birdmath@main/schoolwork/flappybird.html', img: 'https://d112y698adiu2z.cloudfront.net/photos/production/software_photos/002/474/827/datas/original.jpg' }
        ],
        videos: [
            { name: 'Regular Show S1', url: 'vid?https://archive.org/download/regular-show-complete-isos/Regular%20Show/REGULAR%20SHOW%20SEASON%201%20DISC%201.mp4', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7DA8Mt70HVzxLFcWVoQtJ21xgIqH6PRicZA&s' },
            { name: 'The Angry Birds Movie 1', url: 'vid?https://archive.org/download/the-angry-birds-movie-us-dvd-2016/The%20Angry%20Birds%20Movie%20%28US%20DVD%29%20%5B2016%5D.mp4', img: 'https://miro.medium.com/1*iV4Wd1598MxZcuxeu0rC-g.png' },
            { name: 'The Angry Birds Movie 2', url: 'vid?https://archive.org/download/the-angry-birds-movie-2-us-dvd-2019/The%20Angry%20Birds%20Movie%202%20%28US%20DVD%29%20%5B2019%5D.mp4', img: 'https://thecollision.org/wp-content/uploads/2019/08/abmoovie-1.jpg' },
            { name: 'A Minecraft Movie', url: 'vid?https://archive.org/download/a-minecraft-movie_202510/A%20Minecraft%20Movie.ia.mp4', img: 'https://www.minecraft-movie.com/assets/images/mobilebanner.jpg' },
            { name: 'Bringus Studios', url: 'vid?https://archive.org/download/bringus-studios-over-3-hours-of-gaming-on-cursed-devices-to-conk-out-to/Bringus%20Studios%20-%20Over%203%20Hours%20of%20Gaming%20On%20Cursed%20Devices%20to%20Conk%20Out%20To.mp4', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7yJaZJiIpYMSCdXyGEmev_HvW8TI-D07XzVaMV3d1Iw&s' }
        ]
    };

    function renderSection(id, list) {
        const container = document.getElementById(`${id}-grid`);
        container.innerHTML = list.map(item => `
            <div class="card">
                <img src="${item.img}" alt="${item.name}" onerror="this.src='https://placehold.co/400x200/111/accent?text=EPIX'">
                <div class="card-info">
                    <h3>${item.name}</h3>
                    <button class="action-btn" onclick="launch('${item.name}', '${item.url}')">
                        ${id === 'videos' ? 'Watch' : 'Play'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function filterItems(id, query) {
        const filtered = DB[id].filter(x => x.name.toLowerCase().includes(query.toLowerCase()));
        renderSection(id, filtered);
    }

    async function launch(title, url) {
        const view = document.getElementById('player-view');
        const overlay = document.getElementById('player');
        document.getElementById('playing-title').textContent = title;
        view.innerHTML = '';
        overlay.classList.add('active');

        if (url.startsWith('vid?')) {
            const video = document.createElement('video');
            video.src = url.split('?')[1];
            video.controls = true;
            video.autoplay = true;
            video.style.cssText = 'width:100%; height:100%';
            view.appendChild(video);
        } else {
            const ifr = document.createElement('iframe');
            ifr.id = 'player-frame';
            ifr.allowFullscreen = true;
            view.appendChild(ifr);
            if (url.includes('cdn.jsdelivr.net')) {
                try {
                    const res = await fetch(url);
                    const html = await res.text();
                    ifr.contentWindow.document.open();
                    ifr.contentWindow.document.write(html);
                    ifr.contentWindow.document.close();
                } catch(e) { ifr.src = url; }
            } else { ifr.src = url; }
        }
    }

    function closePlayer() {
        document.getElementById('player').classList.remove('active');
        document.getElementById('player-view').innerHTML = '';
    }

    function toggleFS() {
        const elem = document.getElementById('player-view');
        if (elem.requestFullscreen) elem.requestFullscreen();
    }

    function init3D() {
        const canvas = document.getElementById('background3DCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const shapes = [];
        const geom = new THREE.IcosahedronGeometry(1, 0);
        const mat = new THREE.MeshBasicMaterial({ color: 0x61dafb, wireframe: true, transparent: true, opacity: 0.15 });

        for(let i=0; i<15; i++) {
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*15);
            mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            scene.add(mesh);
            shapes.push({ mesh, speed: Math.random() * 0.01 });
        }
        camera.position.z = 10;

        function animate() {
            requestAnimationFrame(animate);
            shapes.forEach(s => {
                s.mesh.rotation.x += s.speed;
                s.mesh.rotation.y += s.speed;
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    window.onload = () => {
        init3D();
        renderSection('apps', DB.apps);
        renderSection('games', DB.games);
        renderSection('videos', DB.videos);
    };
</script>
</body>
</html>
