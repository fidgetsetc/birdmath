
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PenaltyPass</title>
    <style>
        :root {
            --glow-color: #00ffcc;
            --bg-dark: #0a0a16;
            --panel-bg: rgba(15, 15, 35, 0.75);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-family);
            color: #fff;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }

        header {
            margin-top: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 10px var(--glow-color), 0 0 20px #ff007f;
        }

        .tabs {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #fff;
            color: #000;
        }

        .content-panel {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .content-panel.active {
            display: grid;
        }

        .card {
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--glow-color);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .launch-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none; 
        }

        #app-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #000;
            display: none;
        }

        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1001;
            padding: 10px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Responsive stuff */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; letter-spacing: 4px; }
            .tab-btn { padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="ui-container">
        <header>
            <h1>PenaltyPass</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="apps">Apps</button>
            <button class="tab-btn" data-target="games">Games</button>
        </div>

        <div id="apps-panel" class="content-panel active">
            <div class="card" data-url="https://cdn.jsdelivr.net/gh/dogeub/-/index.svg#/search">
                <div class="card-icon">🌐</div>
                <div class="card-title">DogeUB Web</div>
                <div class="launch-btn">Launch</div>
            </div>
        </div>

        <div id="games-panel" class="content-panel">
            <div class="card" data-url="https://cdn.jsdelivr.net/gh/dogeub/-/index.svg#/docs">
                <div class="card-icon">🎮</div>
                <div class="card-title">DogeUB Games</div>
                <div class="launch-btn">Launch</div>
            </div>
            <div class="card" id="bad-piggies-card">
                <div class="card-icon">🐷</div>
                <div class="card-title">Bad Piggies</div>
                <div class="launch-btn">Play</div>
            </div>
        </div>
    </div>

    <div id="app-viewport">
        <button id="close-btn">X</button>
        <iframe id="app-frame" src="about:blank"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        window.onload = function() {
            // --- Tab Logic ---
            const tabBtns = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.content-panel');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    panels.forEach(p => p.classList.remove('active'));
                    
                    btn.classList.add('active');
                    const target = btn.getAttribute('data-target');
                    document.getElementById(target + '-panel').classList.add('active');
                });
            });

            // --- Launch Logic ---
            const viewport = document.getElementById('app-viewport');
            const frame = document.getElementById('app-frame');
            const closeBtn = document.getElementById('close-btn');

            function openApp(url) {
                frame.src = url;
                viewport.style.display = 'block';
            }

            document.querySelectorAll('.card[data-url]').forEach(card => {
                card.addEventListener('click', () => {
                    openApp(card.getAttribute('data-url'));
                });
            });

            closeBtn.addEventListener('click', () => {
                if (frame.src.startsWith('blob:')) {
                    URL.revokeObjectURL(frame.src);
                }
                frame.src = 'about:blank';
                viewport.style.display = 'none';
            });

            // --- Bad Piggies Blob Logic ---
            const badPiggiesBtn = document.getElementById('bad-piggies-card');
            badPiggiesBtn.addEventListener('click', () => {
                const piggiesContent = `
<script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"><\/script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-L7856P3VNT');
<\/script><!DOCTYPE html>
<html lang="en-us">
<head>
	<base href="https://cdn.jsdelivr.net/gh/67-Factory/web-ports@main/badpiggies/">
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Unity WebGL Player | Bad Piggies</title>
	<link rel="shortcut icon" href="TemplateData/favicon.ico">
	<link rel="stylesheet" href="TemplateData/style.css">
	<script src="TemplateData/UnityProgress.js"><\/script>
	<script src="Build/UnityLoader.js"><\/script>
	<style>
		html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
		.webgl-content { width: 100%; height: 100%; }
		#gameContainer { width: 100vw; height: 100vh; }
	</style>
	<script>
		var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Bad Piggies.json", {
			onProgress: UnityProgress
		});
	<\/script>
</head>
<body>
	<div class="webgl-content">
		<div id="gameContainer"></div>
	</div>
</body>
</html>`;
                const blob = new Blob([piggiesContent], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                openApp(blobUrl);
            });

            // --- 3D Background (Three.js) ---
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const cubes = [];
            const colors = [0x00ffcc, 0xff007f, 0x00b3ff, 0x9900ff];
            
            for(let i = 0; i < 40; i++) {
                const size = Math.random() * 1.5 + 0.2;
                const geometry = new THREE.BoxGeometry(size, size, size);
                const material = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const cube = new THREE.Mesh(geometry, material);
                
                cube.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 20 - 10
                );
                
                cube.userData.speed = Math.random() * 0.02 + 0.005;
                cube.userData.rot = Math.random() * 0.02;
                
                cubes.push(cube);
                scene.add(cube);
            }

            camera.position.z = 15;

            function animate() {
                requestAnimationFrame(animate);
                cubes.forEach(c => {
                    c.rotation.x += c.userData.rot;
                    c.rotation.y += c.userData.rot;
                    c.position.z += c.userData.speed;
                    if(c.position.z > 15) c.position.z = -20;
                });
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
