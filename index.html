<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPIXGAMES</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --bg-color: #1a1a1a;
      --bg-image: none;
      --primary-color: #4287f5;
      --secondary-color: #61dafb;
      --text-color: #ffffff;
      --card-bg: rgba(45, 49, 56, 0.9);
      --button-bg: #61dafb;
      --button-hover-bg: #21a1f1;
      --danger-color: #ff4757;
      --success-color: #2ed573;
    }

    body {
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-attachment: fixed; 
      background-position: center;
      color: var(--text-color);
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    header { margin-bottom: 30px; width: 100%; max-width: 1000px; text-align: center; position: relative; }

    h1 {
      font-family: 'Press Start 2P', cursive;
      color: var(--primary-color);
      font-size: 2.5em;
      margin-bottom: 15px;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 4px 4px 0 #000;
      letter-spacing: 2px;
    }

    .abandoned-text {
      color: #fff;
      font-style: italic;
      margin-bottom: 10px;
      font-size: 0.9em;
      background: rgba(0,0,0,0.6);
      padding: 6px 12px;
      border-radius: 4px;
      display: inline-block;
      text-shadow: 1px 1px 2px #000;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #subtitle {
      font-weight: 700;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      opacity: 0.8;
    }

    #tabs-container {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 900px;
      margin-bottom: 30px;
      background-color: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 10px;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .tab-button {
      flex: 1;
      padding: 18px;
      background-color: transparent;
      color: var(--text-color);
      border: none;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.6em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-bottom: 3px solid transparent;
    }

    .tab-button.active { 
      background-color: rgba(255,255,255,0.05); 
      color: var(--button-bg);
      border-bottom-color: var(--button-bg);
    }
    
    .tab-button:hover:not(.active) {
      background-color: rgba(255,255,255,0.1);
    }

    .tab-content { display: none; width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
    .tab-content.active { display: block; }

    /* LOADER */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 50px;
      width: 100%;
    }

    .throbber {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .games-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }

    .game-card {
      background-color: var(--card-bg);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      padding: 18px;
      width: 200px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .game-card:hover { 
      transform: translateY(-10px) scale(1.02); 
      border-color: var(--secondary-color); 
      box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
    }
    .game-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; background: #000; }
    .game-card h3 { font-size: 1.1em; margin: 10px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .play-btn {
      background: var(--button-bg);
      color: #000;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      width: 100%;
      margin-top: auto;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .play-btn:hover { 
      filter: brightness(1.1); 
      transform: translateY(-2px);
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    }
    .play-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .studio-container {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .theme-list {
      margin-top: 20px;
      max-height: 350px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .theme-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
    }
    .theme-item:last-child { border-bottom: none; }
    .theme-item:hover { background: rgba(255,255,255,0.05); border-radius: 8px; }
    
    .theme-item-actions { display: flex; gap: 8px; }
    .mini-btn { 
      padding: 6px 12px; 
      font-size: 10px; 
      border-radius: 6px; 
      border: none; 
      cursor: pointer; 
      font-weight: bold;
      transition: 0.2s;
    }
    .mini-btn:hover { filter: contrast(1.2); transform: scale(1.05); }

    .studio-control input[type="text"], .studio-control input[type="color"] {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.2);
        color: white;
        box-sizing: border-box;
    }

    #background3DCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
    
    .player-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.98); z-index: 5000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .player-overlay.active { display: flex; }
    .iframe-wrapper { width: 95%; height: 85%; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid var(--primary-color); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    #gameFrame { width: 100%; height: 100%; border: none; }

    .player-controls {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      width: 95%;
      justify-content: flex-end;
    }

    .control-btn {
      padding: 12px 25px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: 0.3s;
      text-transform: uppercase;
      font-size: 0.9em;
    }
    .close-btn { background: var(--danger-color); color: white; }
    .fullscreen-btn { background: var(--success-color); color: black; }
    .control-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    .cloak-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; display: none;
      background-size: cover; background-position: center; background-color: black; cursor: none;
    }
  </style>
  <style>
  .search-container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto 25px auto;
    position: relative;
  }

  #gameSearch {
    width: 100%;
    padding: 15px 20px;
    background: var(--card-bg);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: white;
    font-family: 'Roboto', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    box-sizing: border-box;
  }

  #gameSearch:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 15px var(--primary-color);
  }

  .search-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    pointer-events: none;
  }
</style>



</head>
<body>

  <canvas id="background3DCanvas"></canvas>

  <header>
    <h1>EPIXGAMES</h1>
    <div class="abandoned-text">More changes. Even more awesome.</div>
    <p id="subtitle">Let's play.</p>
  </header>

  <nav id="tabs-container">
    <button class="tab-button active" onclick="showTab('games')">Games</button>
    
    <button class="tab-button" onclick="showTab('studio')">Studio</button>
  </nav>

  <div id="content-wrapper">
    <!-- Main Games Tab -->
    <div id="games" class="tab-content active">
      <div id="games-loader" class="loader-container">
        <div class="throbber"></div>
        <p style="font-family: 'Press Start 2P', cursive; font-size: 0.7em;">Booting Library...</p>
      </div>
      <div class="search-container">
  <input type="text" id="gameSearch" placeholder="Search games (e.g. Angry Birds...)" oninput="filterGames()">
</div>
      <div class="games-container" id="new-games-container"></div>
    </div>

    <!-- Cloaks Tab -->
    <div id="cloaks" class="tab-content">
      <div class="studio-container">
        <div>
          <h3 style="font-family: 'Press Start 2P', cursive; font-size: 0.8em; margin-bottom: 20px;">Super-Cloak Setup</h3>
          <p>Press <b>ESC</b> once to exit any cloak.</p>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="cloak-list-item" style="display:flex; justify-content: space-between; align-items:center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px;">
                <span>ChromeOS Boot</span>
                <input type="text" id="key-chrome-boot" maxlength="1" value="p" style="width: 40px; text-align:center; padding: 8px; border-radius: 6px; border: none; background: #444; color: white;">
            </div>
            <div class="cloak-list-item" style="display:flex; justify-content: space-between; align-items:center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px;">
                <span>BSOD Win11</span>
                <input type="text" id="key-bsod" maxlength="1" value="b" style="width: 40px; text-align:center; padding: 8px; border-radius: 6px; border: none; background: #444; color: white;">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Studio Tab -->
    <div id="studio" class="tab-content">
      <div class="studio-container">
        <div>
          <h3 style="font-family: 'Press Start 2P', cursive; font-size: 0.8em;">Theme Studio</h3>
          <div class="studio-control" style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Theme Name</label>
            <input type="text" id="studio-theme-name" placeholder="My Cool Theme">
          </div>
          <div class="studio-control" style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Background Image URL</label>
            <input type="text" id="studio-bg-img" placeholder="https://..." oninput="updateStudioPreview()">
          </div>
          <div class="studio-control" style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">UI Accent Color</label>
            <input type="color" id="studio-accent" value="#61dafb" oninput="updateStudioPreview()">
          </div>
          <button class="play-btn" onclick="saveNewTheme()">Add to Library</button>
          
          <div class="share-container" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <h4 style="margin-bottom: 10px;">Import Theme</h4>
            <div class="studio-control">
              <input type="text" id="share-code-input" placeholder="Paste Base64 theme code here...">
              <button class="play-btn" style="background: var(--success-color); color: black; margin-top: 10px;" onclick="importTheme()">Import From Code</button>
            </div>
          </div>
        </div>
        
        <div>
          <h3 style="font-family: 'Press Start 2P', cursive; font-size: 0.8em;">Theme Library</h3>
          <div class="theme-list" id="theme-library-list"></div>
          <div class="preview-box" id="studio-preview" style="margin-top: 20px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 20px; text-align:center;">
            <p style="font-size: 10px; opacity: 0.5; margin-bottom: 15px;">PREVIEW</p>
            <div id="preview-btn-mock" style="background: var(--button-bg); color: black; padding: 10px; margin: 10px auto; width: 100px; border-radius: 8px; font-weight:bold; font-size: 11px;">Button</div>
            <div id="preview-card-mock" style="background: var(--card-bg); padding: 12px; border-radius: 10px; border: 2px solid var(--secondary-color); font-size: 11px;">Card Border</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Player UI -->
  <div id="gamePlayer" class="player-overlay">
    <div class="iframe-wrapper" id="frameWrapper">
      <iframe id="gameFrame" src="" allowfullscreen="true"></iframe>
    </div>
    <div class="player-controls">
      <button class="control-btn fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="control-btn close-btn" onclick="closeGame()">Close Game</button>
    </div>
  </div>

<script>
function filterGames() {
  const query = document.getElementById('gameSearch').value.toLowerCase();
  const container = document.getElementById('new-games-container');
  
  // Filter the array
  const filtered = NEW_GAMES.filter(game => 
    game.name.toLowerCase().includes(query)
  );

  // Re-render only the filtered ones
  container.innerHTML = '';
  
  if (filtered.length === 0) {
    container.innerHTML = `<p style="font-family: 'Press Start 2P', cursive; font-size: 0.6em; margin-top: 20px;">No games found, dude. 💀</p>`;
    return;
  }

  filtered.forEach((g, index) => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.opacity = '1'; // Skip animation for instant search feel
    card.style.transform = 'translateY(0)';
    card.innerHTML = `<img src="${g.img}"><h3>${g.name}</h3><button class="play-btn" onclick="launch('${g.url}')">Play Now</button>`;
    container.appendChild(card);
  });
};

  const NEW_GAMES = [
    { name: 'Minecrft 1.8 WASM', url: '/schoolwork/mine.html', img: 'https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/ncom/software/switch/70010000000964/a28a81253e919298beab2295e39a56b7a5140ef15abdb56135655e5c221b2a3a' },
    { name: 'Minecrft Pocket 0.6.1 alpha WASM', url: '/schoolwork/pocket/index.html', img: 'https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/ncom/software/switch/70010000000964/a28a81253e919298beab2295e39a56b7a5140ef15abdb56135655e5c221b2a3a' },
    { name: 'Angry Birds', url: '/swf/ab', img: 'https://www.angrybirds.com/wp-content/uploads/2022/06/AB_Classic_1920x1080_TitlePicture_Vector-1300x731.png' },
    { name: 'Clash of Vikings', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/clash_royale/index.html', img: 'https://play-lh.googleusercontent.com/UOJ0N42bDu2lUbZIx4n9UCnHtnY5IEyG1jOLXByCbbCvi6wammxVR4XC9endWA5rAA=w526-h296-rw' },
    { name: 'Cookie Clicker', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/cookie_clicker/index.html', img: 'https://image.api.playstation.com/vulcan/ap/rnd/202507/0723/5bf9ed682a32f58b4546da14f58aa87b6a5f0665b0471fff.png' },
    { name: 'Bit Life', url: 'https://york.cadou.ro.cdn.cloudflare.net/db2/2025/more/e-life-simulation/pre.html', img: 'https://www.gbhbl.com/wp-content/uploads/2019/03/Bitlife11.png' },
    { name: 'Block Blast', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/blocky_puzzle/index.html', img: 'https://m.media-amazon.com/images/I/A1OGHmQseNL.png' },
    { name: '1v1. lol', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/1v1lol/index.html', img: 'https://images.crazygames.com/auto-covers/1v1-lol_1x1.png?auto=format,compress&q=75&cs=strip' },
    { name: 'FNAF 1', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
    { name: 'FNAF 2', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf2/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
    { name: 'FNAF 3', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf3/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
    { name: 'FNAF 4', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf4/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg' },
    { name: 'FNAF Sister Location', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/fnaf5/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg0Hk8qJ8qJ8qJ8qJ8qJ8qJ8q.png' },
    { name: 'Gu n Spin', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/gun_spin/index.html', img: 'https://cdn-0001.qstv.on.epicgames.com/BSAQaGMyfLgZkMqceu/image/landscape_comp.jpeg0.png' },
    { name: 'FNF', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/friday_night_funkin/index.html', img: 'https://friday-nightfunkin.io/upload/imgs/friday-night-funkin.jpg' },
    { name: 'Geometry Dash', url: 'https://york.cadou.ro.cdn.cloudflare.net/db2/2025/scratch/geometry-dash-scratch/pre.html', img: 'https://i.redd.it/dorae3yhjqhb1.jpg' },
    { name: 'Run 1', url: 'https://york.cadou.ro.cdn.cloudflare.net/db2/2024/flash/run-1/pre.html', img: 'https://imgs.crazygames.com/run3b.png?metadata=none&quality=60&height=38940.png' },
    { name: 'Run 3', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/run3/index.html', img: 'https://imgs.crazygames.com/run3b.png?metadata=none&quality=60&height=38945314a58a-36a9-a0aa-9832-c381f9f4e81b/mzl.snentiax.png/1200x600wa.png' },
    { name: 'Fortzone', url: 'https://york.cadou.ro.cdn.cloudflare.net/db2/2025/more/fort-battle-royale/pre.html', img: 'https://dropinblog.net/34253310/files/featured/imagem-2024-09-26-103919931.png' },
    { name: 'Drift Boss', url: 'https://york.cadou.ro.cdn.cloudflare.net/db/html/drift_boss/index.html', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2482zI6ELy-1JDrFwuaMJqA3SUwJQDZKhLw&s' },
    { name: 'Stack Fire Ball', url: 'https://york.cadou.ro.cdn.cloudflare.net/db2/2021/unity/stack-fire-ball/pre.html', img: 'https://imgs.crazygames.com/run3b.png?metadata=none&quality=60&height=38940.png' },
    { name: 'Among Us', url: './schoolwork/amongus.html', img: 'https://static1.colliderimages.com/wordpress/wp-content/uploads/2024/03/among-us-social-featured.jpg' },
    { name: 'Flappy Bird', url: './schoolwork/flappybird.html', img: 'https://d112y698adiu2z.cloudfront.net/photos/production/software_photos/002/474/827/datas/original.jpg' },
    { name: 'Fist Punch', url: './swf/fist', img: 'https://static.wikia.nocookie.net/theregularshow/images/c/c1/Fist_Punch.JPG/' }
  ];

  let bgShapes = [];
  let themeLibrary = JSON.parse(localStorage.getItem('epix_library')) || [
    { id: 'default', name: 'Original Epix', color: '#61dafb', img: '', target: 'all' }
  ];

  function renderGames() {
    const n = document.getElementById('new-games-container');
    const loader = document.getElementById('games-loader');
    
    n.style.display = 'none';
    loader.style.display = 'flex';

    setTimeout(() => {
        loader.style.display = 'none';
        n.style.display = 'flex';
        n.innerHTML = '';
        NEW_GAMES.forEach((g, index) => {
          const card = document.createElement('div');
          card.className = 'game-card';
          card.style.animationDelay = `${index * 0.05}s`;
          card.innerHTML = `<img src="${g.img}"><h3>${g.name}</h3><button class="play-btn" onclick="launch('${g.url}')">Play Now</button>`;
          n.appendChild(card);
        });
    }, 800);
  }

  function launch(u) {
    document.getElementById('gameFrame').src = u;
    document.getElementById('gamePlayer').classList.add('active');
  }

  function closeGame() {
    document.getElementById('gameFrame').src = '';
    document.getElementById('gamePlayer').classList.remove('active');
  }

  function toggleFullscreen() {
    const elem = document.getElementById('frameWrapper');
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
  }

  function showTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    event.currentTarget.classList.add('active');
    if(t === 'games') renderGames();
  }

  // THEME SYSTEM
  function updateStudioPreview() {
    const img = document.getElementById('studio-bg-img').value;
    const color = document.getElementById('studio-accent').value;
    const preview = document.getElementById('studio-preview');
    if(img) preview.style.backgroundImage = `url('${img}')`;
    document.getElementById('preview-btn-mock').style.background = color;
    document.getElementById('preview-card-mock').style.borderColor = color;
  }

  function saveNewTheme() {
    const name = document.getElementById('studio-theme-name').value || "Unnamed Theme";
    const img = document.getElementById('studio-bg-img').value;
    const color = document.getElementById('studio-accent').value;
    
    const newTheme = { id: Date.now().toString(), name, img, color, target: 'all' };
    themeLibrary.push(newTheme);
    saveAndRefreshLibrary();
    applyTheme(newTheme);
    showToast(`Saved ${name}! ✨`);
    document.getElementById('studio-theme-name').value = '';
  }

  function saveAndRefreshLibrary() {
    localStorage.setItem('epix_library', JSON.stringify(themeLibrary));
    renderThemeLibrary();
  }

  function renderThemeLibrary() {
    const list = document.getElementById('theme-library-list');
    list.innerHTML = '';
    themeLibrary.forEach(t => {
        const item = document.createElement('div');
        item.className = 'theme-item';
        item.innerHTML = `
            <div class="theme-item-info">
                <span style="color:${t.color}; text-shadow: 0 0 5px ${t.color}">●</span> <b>${t.name}</b>
            </div>
            <div class="theme-item-actions">
                <button class="mini-btn" style="background:var(--success-color); color:black;" onclick="applyThemeById('${t.id}')">Apply</button>
                <button class="mini-btn" style="background:#444; color:white;" onclick="exportThemeCode('${t.id}')">Code</button>
                <button class="mini-btn" style="background:#555; color:white;" onclick="downloadThemeFile('${t.id}')">File</button>
                ${t.id !== 'default' ? `<button class="mini-btn" style="background:var(--danger-color); color:white;" onclick="deleteTheme('${t.id}')">X</button>` : ''}
            </div>
        `;
        list.appendChild(item);
    });
  }

  function applyThemeById(id) {
    const t = themeLibrary.find(x => x.id === id);
    if(t) {
        applyTheme(t);
        showToast(`Theme: ${t.name} Active`);
    }
  }

  function applyTheme(t) {
    document.documentElement.style.setProperty('--bg-image', t.img ? `url('${t.img}')` : 'none');
    document.documentElement.style.setProperty('--button-bg', t.color);
    document.documentElement.style.setProperty('--primary-color', t.color);
    document.documentElement.style.setProperty('--secondary-color', t.color);
    if(bgShapes.length > 0) bgShapes.forEach(s => s.material.color.set(t.color));
    localStorage.setItem('epix_active_id', t.id);
  }

  function exportThemeCode(id) {
    const t = themeLibrary.find(x => x.id === id);
    const code = btoa(JSON.stringify(t));
    const input = document.getElementById('share-code-input');
    input.value = code;
    input.select();
    document.execCommand('copy');
    showToast("Theme Code Copied! 📋");
  }

  function downloadThemeFile(id) {
    const t = themeLibrary.find(x => x.id === id);
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(t));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", `${t.name.replace(/\s+/g, '_')}_theme.json`);
    dlAnchorElem.click();
    showToast("Downloading JSON... 💾");
  }

  function importTheme() {
    try {
        const code = document.getElementById('share-code-input').value;
        const t = JSON.parse(atob(code));
        t.id = Date.now().toString();
        themeLibrary.push(t);
        saveAndRefreshLibrary();
        applyTheme(t);
        showToast("Theme Imported Successfully! 🔥");
        document.getElementById('share-code-input').value = '';
    } catch(e) {
        showToast("Error: Bad theme code 💀");
    }
  }

  function deleteTheme(id) {
    themeLibrary = themeLibrary.filter(x => x.id !== id);
    saveAndRefreshLibrary();
  }

  function showToast(msg) {
    const old = document.querySelector('.epix-toast');
    if(old) old.remove();
    const t = document.createElement('div');
    t.className = 'epix-toast';
    t.style = "position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--card-bg);backdrop-filter:blur(10px);color:white;padding:12px 25px;border-radius:30px;font-weight:bold;z-index:9999;border:1px solid var(--primary-color);box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: fadeInUp 0.3s ease;";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(20px)';
        t.style.transition = '0.5s';
        setTimeout(() => t.remove(), 500);
    }, 2500);
  }

  function init3D() {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('background3DCanvas'), alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim() || '#4287f5';
    for(let i=0; i<30; i++) {
        const g = new THREE.IcosahedronGeometry(Math.random()*1.5, 0);
        const m = new THREE.MeshBasicMaterial({ color: accent, wireframe: true, transparent: true, opacity: 0.1 });
        const mesh = new THREE.Mesh(g, m);
        mesh.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        scene.add(mesh);
        bgShapes.push(mesh);
    }
    camera.position.z = 25;
    function anim() {
        requestAnimationFrame(anim);
        bgShapes.forEach(it => { it.rotation.x += 0.001; it.rotation.y += 0.001; });
        renderer.render(scene, camera);
    }
    anim();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') {
        document.querySelectorAll('.cloak-overlay').forEach(o => o.style.display = 'none');
        document.getElementById('update-video').pause();
    }
    const k = e.key.toLowerCase();
    const bootK = document.getElementById('key-chrome-boot').value.toLowerCase();
    const bsodK = document.getElementById('key-bsod').value.toLowerCase();
    
    if(k === bootK) document.getElementById('cloak-chrome-boot').style.display = 'block';
    if(k === bsodK) document.getElementById('cloak-bsod').style.display = 'block';
  });

  window.onload = () => { 
    init3D(); 
    renderThemeLibrary();
    const activeId = localStorage.getItem('epix_active_id');
    if(activeId) applyThemeById(activeId);
    renderGames(); 
  };
</script>
</body>
</html>
