<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Hidden until load to prevent flash of unstyled content */
        body { margin: 0; padding: 0; background: transparent; }
        #loader-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loader-overlay">...</div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const payload = params.get('data');

            if (payload) {
                try {
                    // Decode the Base64 string
                    // atob() works for standard base64
                    const decoded = atob(payload);

                    // document.open/write/close is the "old school but gold school" way 
                    // to completely replace the current document context, 
                    // ensuring all <script> and <style> tags in the payload execute.
                    document.open();
                    document.write(decoded);
                    document.close();
                } catch (err) {
                    document.getElementById('loader-overlay').innerText = "Payload Error: Invalid Base64";
                    console.error("L + Ratio + Invalid Base64:", err);
                }
            } else {
                document.getElementById('loader-overlay').innerHTML = `
                    <div style="text-align: center;">
                        <p>Error</p>
                        <small style="opacity: 0.5;">The code wasn't specified. If you are the developer, add ?data=[base64] to the URL.</small>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
